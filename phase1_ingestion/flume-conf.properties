# Flume Configuration for Clickstream Log Ingestion
# This configuration uses a Spooling Directory source to monitor log files
# and writes data to HDFS in real-time

# Name the components on this agent
agent1.sources = log-source
agent1.sinks = hdfs-sink
agent1.channels = mem-channel

# Describe the source (Spooling Directory Source)
# Monitors a directory for new files and reads them line-by-line
agent1.sources.log-source.type = spooldir
agent1.sources.log-source.spoolDir = /clickstream/logs
agent1.sources.log-source.fileHeader = false
agent1.sources.log-source.basenameHeader = false
agent1.sources.log-source.ignorePattern = ^$

# Describe the sink (HDFS Sink)
# Writes data to HDFS in a streaming format
agent1.sinks.hdfs-sink.type = hdfs
agent1.sinks.hdfs-sink.hdfs.path = hdfs://namenode:9000/user/root/clickstream/raw/
agent1.sinks.hdfs-sink.hdfs.fileType = DataStream
agent1.sinks.hdfs-sink.hdfs.writeFormat = Text
agent1.sinks.hdfs-sink.hdfs.rollCount = 0
agent1.sinks.hdfs-sink.hdfs.rollSize = 0
agent1.sinks.hdfs-sink.hdfs.rollInterval = 300

# Use a channel that buffers events in memory
# This is suitable for development; use FileChannel for production
agent1.channels.mem-channel.type = memory
agent1.channels.mem-channel.capacity = 1000
agent1.channels.mem-channel.transactionCapacity = 100

# Bind the source and sink to the channel
agent1.sources.log-source.channels = mem-channel
agent1.sinks.hdfs-sink.channel = mem-channel
